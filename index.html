<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Jurnal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .jurnal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .jurnal-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .jurnal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .jurnal-card h2 {
            color: #667eea;
            font-size: 1.4rem;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-label {
            font-weight: 600;
            color: #555;
        }

        .info-value {
            color: #333;
            text-align: right;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-sinta {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-fast-ya {
            background: #c8e6c9;
            color: #388e3c;
        }

        .badge-fast-tidak {
            background: #ffebee;
            color: #d32f2f;
        }

        .btn-visit {
            display: inline-block;
            width: 100%;
            padding: 12px 20px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            transition: opacity 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-visit:hover {
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.5rem;
            padding: 50px;
        }

        .error {
            text-align: center;
            color: #ffcdd2;
            background: rgba(255,0,0,0.2);
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .jurnal-grid {
                grid-template-columns: 1fr;
            }

            .info-row {
                flex-direction: column;
                gap: 5px;
            }

            .info-value {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Direktori Jurnal</h1>
            <p>Daftar jurnal terakreditasi SINTA</p>
        </header>

        <div id="jurnal-container" class="jurnal-grid">
            <div class="loading">Memuat data...</div>
        </div>
    </div>

    <script>
        async function loadJurnalData() {
            const container = document.getElementById('jurnal-container');
            
            try {
                const response = await fetch('data.json');
                
                if (!response.ok) {
                    throw new Error('Gagal memuat data');
                }
                
                const data = await response.json();
                
                container.innerHTML = '';
                
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'jurnal-card';
                    
                    const fastTrackClass = item.fast_track.toLowerCase() === 'ya' ? 'badge-fast-ya' : 'badge-fast-tidak';
                    
                    card.innerHTML = `
                        <h2>${item.nama_jurnal}</h2>
                        <div class="info-row">
                            <span class="info-label">Kampus</span>
                            <span class="info-value">${item.kampus}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Subject Area</span>
                            <span class="info-value">${item.subject_area}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Akreditasi</span>
                            <span class="info-value"><span class="badge badge-sinta">${item.akreditasi_sinta}</span></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Masa Berlaku</span>
                            <span class="info-value">${item.masa_berlaku}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Tanggal Publikasi</span>
                            <span class="info-value">${item.tanggal_publikasi}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Biaya</span>
                            <span class="info-value">${item.biaya}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Fast Track</span>
                            <span class="info-value"><span class="badge ${fastTrackClass}">${item.fast_track}</span></span>
                        </div>
                        <a href="${item.situs_web}" target="_blank" rel="noopener noreferrer" class="btn-visit">
                            🔗 Kunjungi Halaman
                        </a>
                    `;
                    
                    container.appendChild(card);
                });
                
            } catch (error) {
                container.innerHTML = `
                    <div class="error">
                        <p>⚠️ Terjadi kesalahan saat memuat data</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">${error.message}</p>
                    </div>
                `;
                console.error('Error loading data:', error);
            }
        }

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', loadJurnalData);
    </script>
</body>
</html>
